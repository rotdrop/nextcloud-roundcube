name: Build and test

on:
  push:
    branches:
      - "*"
    tags:
      - "*"

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
            
      - id: checkout-code
        uses: actions/checkout@v3
        with:
          path: source

      - id: build
        run: |
          pushd source
          make build
